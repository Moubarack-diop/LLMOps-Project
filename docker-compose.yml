services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: medassist_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: medassist_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medassist_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MEDASSIST_EAGER_INIT=1
      # ANTHROPIC_API_KEY et LLM_MODEL sont fournis via le fichier .env
    depends_on:
      qdrant:
        condition: service_started
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src

volumes:
  qdrant_data:
  mlflow_data:
